services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Persist uploaded videos/photos across container restarts
      - ./storage:/app/storage
      # Mount the TFLite model
      - ./app/resources:/app/app/resources
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      # Persist MongoDB data across container restarts
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
